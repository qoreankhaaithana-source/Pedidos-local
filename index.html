<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos Online</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#f4f4f6;
}
.container{
  max-width:420px;
  margin:auto;
  padding:15px;
}
.card{
  background:#fff;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
  box-shadow:0 5px 15px rgba(0,0,0,.08);
}
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  margin-top:8px;
  font-weight:bold;
  cursor:pointer;
}
.btn-add{
  background:#eee;
}
.btn-yape{
  background:linear-gradient(135deg,#7B2CBF,#9D4EDD);
  color:#fff;
}
.total{
  font-size:18px;
  font-weight:bold;
  margin-top:10px;
}
input, select{
  width:100%;
  padding:8px;
  margin-top:5px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Haz tu pedido</h2>

<div class="card">
<b>Alitas BBQ</b><br>S/ 30
<button class="btn-add" onclick="agregar('Alitas BBQ',30)">Agregar</button>
</div>

<div class="card">
<b>Alitas Acevichadas</b><br>S/ 32
<button class="btn-add" onclick="agregar('Alitas Acevichadas',32)">Agregar</button>
</div>

<div class="card">
<b>Chicha Morada</b><br>S/ 8
<button class="btn-add" onclick="agregar('Chicha Morada',8)">Agregar</button>
</div>

<div class="card">
<label>Observaciones</label>
<input id="obs">

<label>Modalidad</label>
<select id="modo">
<option>Para llevar</option>
<option>Comer en local</option>
</select>

<div class="total">
Total: S/ <span id="total">0</span>
</div>

<button class="btn-yape" onclick="enviar()">
💜 Pagar con Yape
</button>
</div>

</div>

<script>
let carrito=[];
let total=0;

function agregar(nombre,precio){
  carrito.push(nombre);
  total+=precio;
  document.getElementById("total").innerText=total;
}

function enviar(){
  if(total===0){
    alert("Agrega al menos un producto");
    return;
  }

  let obs=document.getElementById("obs").value;
  let modo=document.getElementById("modo").value;

  let mensaje="*NUEVO PEDIDO*%0A%0A";

  carrito.forEach(p=>{
    mensaje+=p+"%0A";
  });

  mensaje+="%0AModalidad: "+modo;
  mensaje+="%0AObservaciones: "+obs;
  mensaje+="%0ATotal: S/ "+total;
  mensaje+="%0AMetodo: Yape";

  window.open("https://wa.me/51998391223?text="+mensaje,"_blank");
}
</script>

</body>
</html>
