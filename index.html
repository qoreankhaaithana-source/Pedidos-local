<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Monster Burger & Grill</title>
<style>
body { font-family: Arial, sans-serif; margin:0; padding:0; background:#fff; }
.header { background:#fff; padding:10px; position:sticky; top:0; z-index:10; display:flex; flex-direction:column; align-items:center; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.header h1 { color:#8B4513; font-weight:bold; margin:0; font-size:1.8rem; text-align:center;}
.secciones { margin-top:10px; display:flex; gap:5px; flex-wrap:wrap; justify-content:center; }
.secciones button, #btnCarrito { background:orange; color:#fff; border:none; padding:6px 10px; border-radius:5px; font-weight:bold; cursor:pointer; text-transform:uppercase;}
#btnCarrito { background:#32CD32; margin-bottom:5px; }
.menu, .carritoOverlay { padding:10px; max-width:500px; margin:0 auto; }
.card { border:1px solid #ddd; border-radius:5px; padding:10px; margin-bottom:10px; display:flex; flex-direction:column; }
.card-top { display:flex; justify-content:space-between; align-items:center; }
.card-buttons button { margin-left:3px; margin-right:3px; padding:2px 6px; cursor:pointer; }
.input-obs { margin-top:5px; padding:4px; width:100%; border:1px solid #ccc; border-radius:4px; }
.carritoOverlay { position:fixed; top:60px; right:0; width:100%; max-width:400px; height:80%; background:#fff; box-shadow:-2px 0 8px rgba(0,0,0,0.2); overflow-y:auto; display:none; z-index:20; padding:10px; }
#btnCerrarCarrito { background:red; color:#fff; padding:5px 8px; border:none; cursor:pointer; border-radius:4px; margin-bottom:10px; }
.totalCarrito { font-weight:bold; margin-top:10px; text-align:right; }
</style>
</head>
<body>

<div class="header">
  <h1>🔥 The Monster Burger & Grill 🔥</h1>
  <button id="btnCarrito" onclick="toggleCarrito()">Carrito</button>
  <div class="secciones">
    <button onclick="scrollToSection('Burgers')">BURGERS</button>
    <button onclick="scrollToSection('Salchis')">SALCHIS</button>
    <button onclick="scrollToSection('Broasters')">BROASTERS</button>
    <button onclick="scrollToSection('Alitas')">ALITAS</button>
    <button onclick="scrollToSection('AlaPlancha')">A LA PLANCHA</button>
  </div>
</div>

<div class="menu">
<h2 id="Burgers">BURGERS 🍔</h2>
<div id="menuBurgers"></div>

<h2 id="Salchis">SALCHIS 🍟</h2>
<div id="menuSalchis"></div>

<h2 id="Broasters">BROASTERS 🍗</h2>
<div id="menuBroasters"></div>

<h2 id="Alitas">ALITAS 🍗</h2>
<div id="menuAlitas"></div>

<h2 id="AlaPlancha">A LA PLANCHA 🥩</h2>
<div id="menuAlaPlancha"></div>
</div>

<div class="carritoOverlay" id="carritoOverlay">
  <button id="btnCerrarCarrito" onclick="toggleCarrito()">Cerrar</button>
  <h3>Tu carrito</h3>
  <div id="contenidoCarrito"></div>
  <div class="totalCarrito" id="totalCarrito">Total: S/0</div>
  <label>Modalidad:</label>
  <select id="modalidad">
    <option value="Comer en local">Comer en local</option>
    <option value="Recojo">Recojo</option>
    <option value="Delivery">Delivery</option>
  </select>
  <button style="background:#32CD32;color:#fff;padding:6px 10px;border:none;border-radius:5px;margin-top:10px;" onclick="enviarPedidoWhatsApp()">Realizar pedido</button>
</div>

<script>
let carrito = [];

// Carta completa
const carta = {
  Burgers:[{nombre:"Burger clásica",precio:10},{nombre:"Burger cheese",precio:13},{nombre:"Burger royal",precio:13},{nombre:"Burger chicken",precio:14},{nombre:"Burger hawaiana",precio:14},{nombre:"Burger a los misio",precio:15},{nombre:"Burger baconator",precio:16},{nombre:"Two Burger",precio:17},{nombre:"Burger Monster",precio:20}],
  Salchis:[{nombre:"Salchi clásica",precio:10},{nombre:"Choripapa",precio:12},{nombre:"Salchi Royal",precio:14},{nombre:"Salchipollo",precio:15},{nombre:"Salchi nuggets",precio:15},{nombre:"Salchi a lo misio",precio:16},{nombre:"Salchi Monster",precio:18}],
  Broasters:[{nombre:"Alita",precio:11},{nombre:"Pierna",precio:12},{nombre:"Encuentro",precio:12},{nombre:"Pecho",precio:14},{nombre:"Chicharrón de pollo",precio:13},{nombre:"Pierna completa",precio:18},{nombre:"Pecho completo",precio:20}],
  Alitas:[{nombre:"BBQ x4",precio:12},{nombre:"BBQ x6",precio:18},{nombre:"Acevichadas x4",precio:12},{nombre:"Acevichadas x6",precio:18},{nombre:"Búfalo x4",precio:12},{nombre:"Búfalo x6",precio:18},{nombre:"Piña x4",precio:12},{nombre:"Piña x6",precio:18},{nombre:"Maracuya x4",precio:12},{nombre:"Maracuya x6",precio:18}],
  AlaPlancha:[{nombre:"Churrasco",precio:18},{nombre:"Chuleta",precio:18},{nombre:"Alita a la plancha",precio:11},{nombre:"Pierna a la plancha",precio:12},{nombre:"Encuentro a la plancha",precio:12},{nombre:"Pecho a la plancha",precio:14},{nombre:"Pierna completa a la plancha",precio:18},{nombre:"Pecho completo a la plancha",precio:20}]
};

// Generar menú sin observaciones
function generarMenu(){
  for(const seccion in carta){
    const contenedor = document.getElementById("menu"+seccion);
    carta[seccion].forEach(item=>{
      const div = document.createElement("div");
      div.className="card";
      div.innerHTML=`<div class="card-top"><span>${item.nombre} – S/${item.precio}</span>
      <div class="card-buttons">
        <button onclick="restarMenu('${item.nombre}')">-</button>
        <span id="cant-${item.nombre}">0</span>
        <button onclick="agregar('${item.nombre}',${item.precio})">+</button>
        <button onclick="eliminar('${item.nombre}')">🗑</button>
      </div></div>`;
      contenedor.appendChild(div);
    });
  }
}

// Funciones carrito
function agregar(nombre,precio){
  let item = carrito.find(i=>i.nombre===nombre);
  if(item){
    item.cantidad++;
  } else {
    carrito.push({nombre, cantidad:1, precio, observaciones:''});
  }
  actualizarCantidad(nombre);
  actualizarCarrito();
}

function restarMenu(nombre){
  let item = carrito.find(i=>i.nombre===nombre);
  if(item){
    item.cantidad--;
    if(item.cantidad<=0) carrito = carrito.filter(i=>i.nombre!==nombre);
    actualizarCantidad(nombre);
    actualizarCarrito();
  }
}

function eliminar(nombre){
  carrito = carrito.filter(i=>i.nombre!==nombre);
  actualizarCantidad(nombre);
  actualizarCarrito();
}

function actualizarCantidad(nombre){
  let span = document.getElementById('cant-'+nombre);
  let item = carrito.find(i=>i.nombre===nombre);
  if(span) span.innerText = item?item.cantidad:0;
}

// Generar carrito con observaciones solo aquí
function actualizarCarrito(){
  const div = document.getElementById('contenidoCarrito');
  div.innerHTML='';
  let total = 0;
  carrito.forEach((item,index)=>{
    total += item.precio*item.cantidad;
    if(item.cantidad>0){
      let card = document.createElement('div');
      card.className='card';
      card.innerHTML=`<div class="card-top">
        <span>${item.nombre} – S/${item.precio} x${item.cantidad}</span>
        <div class="card-buttons">
          <button onclick="restarMenu('${item.nombre}')">-</button>
          <span>${item.cantidad}</span>
          <button onclick="agregar('${item.nombre}',${item.precio})">+</button>
          <button onclick="eliminar('${item.nombre}')">🗑</button>
        </div>
      </div>
      <input type="text" placeholder="Observaciones para ${item.nombre}" class="input-obs" value="${item.observaciones}" oninput="carrito[${index}].observaciones=this.value">`;
      div.appendChild(card);
    }
  });
  document.getElementById('totalCarrito').innerText = `Total: S/${total}`;
}

function toggleCarrito(){
  let overlay = document.getElementById('carritoOverlay');
  overlay.style.display = overlay.style.display==='block'?'none':'block';
}

function scrollToSection(id){
  document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

function enviarPedidoWhatsApp(){
  if(carrito.length===0){ alert("El carrito está vacío"); return;}
  let mensaje = "📋 *Pedido The Monster Burger*\n\n";
  let total = 0;
  carrito.forEach(item=>{
    if(item.cantidad>0){
      mensaje+=`• ${item.nombre} x${item.cantidad}`;
      if(item.observaciones && item.observaciones.trim()!=="") mensaje+=` (Obs: ${item.observaciones})`;
      mensaje+='\n';
      total += item.precio*item.cantidad;
    }
  });
  let modalidad = document.getElementById('modalidad').value;
  mensaje+=`\nModalidad: ${modalidad}\nTotal: S/${total}`;
  mensaje+="\n\nGracias por elegirnos! 🍔🔥";
  const numero = "+51998391223";
  const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`;
  window.open(url,'_blank');
}

window.onload = generarMenu;
</script>

</body>
</html>
